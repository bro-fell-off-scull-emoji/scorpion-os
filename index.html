<!DOCTYPE html>
<html>
<head>
  <title>VantaOS</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
    }

    #desktop {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #taskbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 50px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .taskbar-btn {
      margin-right: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="desktop"></div>

<div id="taskbar">
  <div class="taskbar-btn" onclick="openApp('notes')">Notes</div>
</div>

<script>
function openApp(app) {
  alert("Opening " + app);
}
</script>

</body>
</html>
