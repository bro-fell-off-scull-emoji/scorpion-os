<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes App</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  height: 100vh;
}

/* Sidebar */
#sidebar {
  width: 250px;
  background: #f5f5f7;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

#notesList {
  flex: 1;
  overflow-y: auto;
}

.note-item {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

.note-item:hover {
  background: #e5e5ea;
}

.note-item.active {
  background: #d1d1d6;
}

/* Buttons */
#newNoteBtn {
  padding: 12px;
  border: none;
  background: #007aff;
  color: white;
  cursor: pointer;
}

#newNoteBtn:hover {
  background: #005ecb;
}

/* Editor */
#editor {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#title {
  font-size: 20px;
  border: none;
  padding: 15px;
  outline: none;
  border-bottom: 1px solid #ddd;
}

#content {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  resize: none;
  font-size: 16px;
}

/* Delete button */
#deleteBtn {
  background: #ff3b30;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="sidebar">
  <button id="newNoteBtn">+ New Note</button>
  <div id="notesList"></div>
</div>

<div id="editor">
  <input id="title" placeholder="Title">
  <textarea id="content" placeholder="Write your note..."></textarea>
  <button id="deleteBtn">Delete Note</button>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let currentNoteIndex = null;

const notesList = document.getElementById("notesList");
const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");

/* Save notes */
function saveNotes() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

/* Render sidebar */
function renderNotes() {
  notesList.innerHTML = "";

  notes.forEach((note, index) => {
    const div = document.createElement("div");
    div.className = "note-item" + (index === currentNoteIndex ? " active" : "");
    div.textContent = note.title || "New Note";

    div.onclick = () => openNote(index);
    notesList.appendChild(div);
  });
}

/* Open note */
function openNote(index) {
  currentNoteIndex = index;
  titleInput.value = notes[index].title;
  contentInput.value = notes[index].content;
  renderNotes();
}

/* New note */
document.getElementById("newNoteBtn").onclick = () => {
  const newNote = { title: "", content: "" };
  notes.unshift(newNote);
  currentNoteIndex = 0;
  saveNotes();
  renderNotes();
  openNote(0);
};

/* Delete note */
document.getElementById("deleteBtn").onclick = () => {
  if (currentNoteIndex !== null) {
    notes.splice(currentNoteIndex, 1);
    currentNoteIndex = null;
    titleInput.value = "";
    contentInput.value = "";
    saveNotes();
    renderNotes();
  }
};

/* Auto-save */
titleInput.oninput = contentInput.oninput = () => {
  if (currentNoteIndex !== null) {
    notes[currentNoteIndex].title = titleInput.value;
    notes[currentNoteIndex].content = contentInput.value;
    saveNotes();
    renderNotes();
  }
};

/* Init */
renderNotes();
</script>

</body>
</html>
